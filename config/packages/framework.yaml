# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    # Reverse proxy — nécessaire pour que X-Forwarded-Prefix soit respecté
    # REMOTE_ADDR = faire confiance au proxy direct quel que soit son IP
    trusted_proxies: '127.0.0.1,REMOTE_ADDR'
    trusted_headers:
        - 'x-forwarded-for'
        - 'x-forwarded-proto'
        - 'x-forwarded-prefix'
        - 'x-forwarded-host'
        - 'x-forwarded-port'

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
