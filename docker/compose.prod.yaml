##
## Prod — chargé explicitement via Makefile (-f docker/compose.prod.yaml)
## Services : php (fpm) + nginx
##
## Usage :
##   make up-prod SITE=unetaupechezvous
##   make fixtures-prod SITE=unetaupechezvous
##   make init-prod SITE=unetaupechezvous   # up + migrate + fixtures + cache
##

services:
  php:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile.prod
    container_name: php-${SITE:-annuaire}
    working_dir: /srv/app
    env_file:
      - ../.env.${SITE}
    volumes:
      - app_var:/srv/app/var:rw
      - app_bundles:/srv/app/public/bundles:rw
      - app_assets:/srv/app/public/assets:rw
      - app_uploads:/srv/app/public/uploads:rw
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    container_name: nginx-${SITE:-annuaire}
    depends_on:
      - php
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - app_bundles:/srv/app/public/bundles:ro
      - app_assets:/srv/app/public/assets:ro
      - app_uploads:/srv/app/public/uploads:ro
    restart: unless-stopped

volumes:
  app_var:
  app_bundles:
  app_assets:
  app_uploads:
